version: 2
updated_at: "2026-06-09"
repo:
  name: audiobook-cleaner-lab
  type: ai_audio_text_pipeline
  primary_language: python
  package_manager: pip
  entrypoints:
    - apps/api/main.py
    - apps/web/src/main.tsx
    - scripts/start_local.sh
  core_user_flows:
    - import_manifest → ASR → normalize → align → llm_cut → review_ui → export
    - batch_process multi-chapter dry-run
    - start_local.sh one-click API + Web + demo seed

docs:
  read_first:
    - AGENTS.md
    - agent_tools.yaml
    - agent_layer.yaml
    - docs/TOOL_USAGE_POLICY.md
    - docs/AGENT_RUNBOOK.md
    - docs/AGENT_ROADMAP.md
    - reports/latest-agent-report.json
  research_notes: docs/RESEARCH_NOTES.md
  tool_inventory: docs/TOOL_INVENTORY.md

commands:
  install:
    - python3 -m venv .venv && source .venv/bin/activate && pip install fastapi uvicorn pydantic httpx
    - cd apps/web && npm install
  dev:
    - bash scripts/start_local.sh
    - python3 scripts/run_api.py
    - cd apps/web && npm run dev
  build:
    - cd apps/web && npm run build
  lint: []
  test:
    - python3 -m pytest tests/ -q
    - cd apps/web && npm run test
  e2e:
    - cd apps/web && npm run test
  typecheck:
    - cd apps/web && npm run build
  format_check: []
  dry_run:
    - python3 scripts/run_export.py --project-id book_001 --chapter-id chapter_001 --dry-run
    - python3 scripts/auto_advance.py
  agent_gate:
    - python3 scripts/agent_gate.py
  user_view_test:
    - python3 scripts/user_view_test.py

paths:
  docs: docs
  reports: reports
  scripts: scripts
  tests: tests
  artifacts: data
  fixtures: data
  schemas: schemas

agent_policy:
  primary_agent_surface: cursor
  secondary_agent_surface: codex
  default_mode: safe
  allow_real_api: false
  allow_real_publish: false
  require_web_search_for_fresh_info: true
  require_tool_probe_before_tool_plan: true
  require_tool_usage_log: true
  require_report: true
  require_gate_before_commit: true
  max_scope_per_round: small
  prefer_incremental_changes: true

severity:
  p0: "data loss, secret leak, app cannot start, build completely broken, destructive behavior, real publish/API misfire"
  p1: "core user flow broken, main feature unusable, core tests failing, user cannot complete main task"
  p2: "non-critical feature issue, UI/UX defect, partial degradation"
  p3: "docs, refactor, polish, non-blocking improvement"

round:
  report_schema: schemas/agent_round_report.schema.json
  latest_report: reports/latest-agent-report.json
  audit_log: reports/agent_audit_log.jsonl
  roadmap: docs/AGENT_ROADMAP.md
  tool_probe_report: reports/tool_probe_report.json
